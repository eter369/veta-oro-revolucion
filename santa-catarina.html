<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Santa Catarina — Bienes Raíces KIPU</title>
<style>
  /* ============================================================
     PORTAFOLIO INTERACTIVO — estilo "escritorio"
     Toda la información editable está al inicio del <script>,
     en la sección marcada como  ZONA EDITABLE.
     ============================================================ */

  :root{
    --gris-fondo-1:#8f8f8f;
    --gris-fondo-2:#6f6f6f;
    --tinta:#161616;
    --papel:rgba(246,246,246,.94);
    --etiqueta:#f3f3f3;
    --radio-ventana:16px;
    --fuente:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Helvetica,Arial,sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:var(--fuente);
    background:linear-gradient(180deg,var(--gris-fondo-1) 0%,#828282 55%,var(--gris-fondo-2) 100%);
    color:var(--etiqueta);
    user-select:none;
    -webkit-user-select:none;
  }
  html.cursor-oculto,
  html.cursor-oculto *{cursor:none !important}

  /* ---------- Escena / fondo ---------- */
  #escena{position:fixed;inset:0;overflow:hidden}
  #fondo{
    position:absolute;inset:-4%;
    will-change:transform;
  }
  /* foco de luz que sigue al puntero */
  #foco{
    position:absolute;left:0;top:0;
    width:54vmax;height:54vmax;
    pointer-events:none;z-index:2;
    background:radial-gradient(circle closest-side,rgba(255,255,255,.17),rgba(255,255,255,.05) 46%,transparent 72%);
    mix-blend-mode:soft-light;
    opacity:0;transition:opacity .8s ease;
    will-change:transform;
  }
  body.raton-activo #foco{opacity:1}
  .figura{
    position:absolute;left:50%;top:54%;
    width:min(148vmin,1400px);height:min(148vmin,1400px);
    transform:translate(-50%,-50%);
    opacity:.98;
  }
  /* FOTO PROPIA (opcional):
     pega la URL de tu foto en el atributo src de la etiqueta
     <img id="foto-fondo" ...> que está en el HTML más abajo.
     Si tiene src, reemplaza automáticamente a la figura generada. */
  #foto-fondo{
    display:none;
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center 20%;
    filter:grayscale(1) contrast(1.04) brightness(.96);
  }
  body.con-foto #foto-fondo{display:block}
  body.con-foto .figura{display:none}

  /* viñeta */
  #escena::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse 120% 90% at 50% 42%,transparent 52%,rgba(18,18,18,.38) 100%),
      linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 18%,transparent 78%,rgba(0,0,0,.22) 100%);
  }

  /* sticker sonriente */
  #sticker{
    position:absolute;left:57%;top:63%;
    width:54px;height:54px;border:none;background:transparent;
    transform:rotate(14deg);
    opacity:.85;cursor:grab;touch-action:none;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;
    z-index:4;
  }
  #sticker:hover{transform:rotate(-6deg) scale(1.12);opacity:1}
  #sticker svg{width:100%;height:100%;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}

  /* ---------- Marca y reloj ---------- */
  .marca{
    position:fixed;top:22px;left:26px;z-index:20;
    font-size:13px;letter-spacing:.16em;font-weight:600;
    color:rgba(255,255,255,.92);text-transform:uppercase;
    text-shadow:0 1px 8px rgba(0,0,0,.3);
  }
  .marca small{font-weight:400;opacity:.55;letter-spacing:.08em;margin-left:10px;text-transform:none}
  #reloj{
    position:fixed;top:22px;right:26px;z-index:20;
    font-size:12px;letter-spacing:.12em;
    color:rgba(255,255,255,.75);text-transform:uppercase;
    font-variant-numeric:tabular-nums;
    text-shadow:0 1px 8px rgba(0,0,0,.3);
  }

  /* ---------- Iconos de proyectos ---------- */
  #iconos{position:absolute;inset:0;will-change:transform}
  .icono{
    position:absolute;
    transform:translate(-50%,-50%);
    touch-action:none;
    z-index:5;
  }
  .icono-inner{animation:flotar 7s ease-in-out infinite}
  .icono:nth-child(2n) .icono-inner{animation-duration:8.5s;animation-delay:-2.2s}
  .icono:nth-child(3n) .icono-inner{animation-duration:9.5s;animation-delay:-4.1s}
  @keyframes flotar{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
  }
  .icono button{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    background:none;border:none;font-family:inherit;color:inherit;
    cursor:pointer;padding:6px;
    will-change:translate; /* efecto imán */
  }
  .icono .mini{
    width:58px;height:58px;border-radius:13px;overflow:hidden;
    box-shadow:0 10px 26px rgba(0,0,0,.38),0 2px 6px rgba(0,0,0,.25);
    outline:1px solid rgba(255,255,255,.28);outline-offset:-1px;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;
    background:#555;
  }
  .icono .mini svg,.icono .mini img{width:100%;height:100%;display:block;object-fit:cover}
  .icono .mini.carpeta{
    background:transparent;
    box-shadow:none;outline:none;border-radius:0;overflow:visible;
    filter:drop-shadow(0 10px 22px rgba(0,0,0,.35));
    width:64px;height:58px;
  }
  .icono button:hover .mini{
    transform:perspective(430px) scale(1.16) translateY(-4px)
              rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
    box-shadow:0 18px 38px rgba(0,0,0,.45);
  }
  .icono button:active .mini{transform:perspective(430px) scale(1.04) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg))}
  .icono .nombre{
    font-size:11.5px;letter-spacing:.02em;font-weight:500;
    color:var(--etiqueta);
    text-shadow:0 1px 4px rgba(0,0,0,.55),0 0 14px rgba(0,0,0,.25);
    padding:3px 9px;border-radius:7px;white-space:nowrap;
    transition:background .2s,color .2s,text-shadow .2s;
  }
  .icono.activo .nombre{background:rgba(250,250,250,.95);color:#111;text-shadow:none}
  .icono.arrastrando{z-index:60}
  .icono.arrastrando .icono-inner{animation-play-state:paused}
  .icono.arrastrando .mini{transform:scale(1.18);box-shadow:0 26px 50px rgba(0,0,0,.5)}

  .oculto-inicial{opacity:0;transform:translate(-50%,-50%) scale(.6)}
  .aparecer{
    transition:opacity .7s ease,transform .7s cubic-bezier(.34,1.4,.44,1);
    opacity:1;transform:translate(-50%,-50%) scale(1);
  }

  /* ---------- Ventana de proyecto ---------- */
  #capa-ventanas{position:fixed;inset:0;z-index:100;pointer-events:none}
  .ventana{
    position:absolute;
    width:min(760px,calc(100vw - 40px));
    background:var(--papel);
    color:var(--tinta);
    border-radius:var(--radio-ventana);
    box-shadow:0 40px 90px rgba(0,0,0,.5),0 6px 22px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.55);
    backdrop-filter:blur(22px) saturate(1.25);
    -webkit-backdrop-filter:blur(22px) saturate(1.25);
    pointer-events:auto;
    overflow:hidden;
    opacity:0;transform:scale(.94) translateY(12px);
    rotate:0deg;
    transition:opacity .28s ease,transform .32s cubic-bezier(.2,1.1,.3,1),rotate .32s ease;
  }
  .ventana.abierta{opacity:1;transform:scale(1) translateY(0)}
  .ventana.cerrando{opacity:0;transform:scale(.95) translateY(10px)}

  .ventana-barra{
    display:flex;align-items:center;gap:8px;
    height:42px;padding:0 14px;
    background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(240,240,240,.35));
    border-bottom:1px solid rgba(0,0,0,.08);
    cursor:grab;
  }
  .ventana-barra:active{cursor:grabbing}
  .luces{display:flex;gap:8px}
  .luz{width:13px;height:13px;border-radius:50%;border:none;padding:0;position:relative}
  .luz-roja{background:#ff5f57;cursor:pointer}
  .luz-roja::after{
    content:"×";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;line-height:1;color:rgba(0,0,0,.55);opacity:0;font-weight:700;
  }
  .luz-roja:hover::after{opacity:1}
  .luz-ambar{background:#febc2e}
  .luz-verde{background:#28c840}
  .ventana-titulo{
    flex:1;text-align:center;font-size:12.5px;font-weight:600;
    color:rgba(0,0,0,.55);letter-spacing:.03em;
    margin-right:55px; /* compensa las luces para centrar */
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  .ventana-cuerpo{display:flex;max-height:min(66vh,540px)}
  .ventana-hero{
    flex:0 0 44%;position:relative;min-height:340px;overflow:hidden;
    background:#dcdcdc;
  }
  .ventana-hero svg,.ventana-hero img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .ventana-info{
    flex:1;padding:26px 28px 24px;overflow-y:auto;
    display:flex;flex-direction:column;gap:14px;align-items:flex-start;
  }
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
    padding:5px 10px;border-radius:999px;
    background:rgba(0,0,0,.07);color:rgba(0,0,0,.6);
  }
  .chip.acento{color:#fff}
  .ventana-info h2{
    font-size:26px;line-height:1.12;font-weight:700;letter-spacing:-.015em;
  }
  .ventana-info .desc{
    font-size:13.5px;line-height:1.65;color:rgba(0,0,0,.68);
    user-select:text;-webkit-user-select:text;
  }
  .tags{display:flex;gap:6px;flex-wrap:wrap;list-style:none}
  .tags li{
    font-size:11px;color:rgba(0,0,0,.5);
    padding:4px 9px;border:1px solid rgba(0,0,0,.14);border-radius:999px;
  }
  .galeria{display:flex;gap:8px;width:100%}
  .galeria .cuadro{
    flex:1;aspect-ratio:4/3;border-radius:9px;overflow:hidden;
    background:rgba(0,0,0,.05);
  }
  .galeria .cuadro img{width:100%;height:100%;object-fit:cover;display:block}
  .galeria .cuadro.vacio{
    border:1.5px dashed rgba(0,0,0,.18);background:transparent;
    display:flex;align-items:center;justify-content:center;
    font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.35);
  }
  .boton{
    margin-top:2px;
    display:inline-flex;align-items:center;gap:7px;
    font-size:12.5px;font-weight:600;letter-spacing:.02em;
    color:#fff;background:#161616;text-decoration:none;
    padding:10px 18px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;
    transition:transform .2s,background .2s;
  }
  .boton:hover{transform:translateY(-1px);background:#000}
  .texto-libre{font-size:13.5px;line-height:1.7;color:rgba(0,0,0,.7);user-select:text;-webkit-user-select:text}
  .texto-libre p+p{margin-top:10px}
  .texto-libre a{color:inherit}
  .texto-libre .fila-dato{display:flex;gap:10px;margin-top:6px;font-size:13px}
  .texto-libre .fila-dato span:first-child{min-width:86px;font-weight:600;color:rgba(0,0,0,.45);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding-top:2px}

  /* ---------- Dock ---------- */
  #dock{
    position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    display:flex;align-items:flex-end;gap:10px;
    padding:9px 14px;border-radius:22px;
    background:rgba(250,250,250,.55);
    backdrop-filter:blur(20px) saturate(1.4);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);
    box-shadow:0 16px 40px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.4);
    z-index:200;
  }
  .dock-icono{
    position:relative;
    width:46px;height:46px;border-radius:11px;overflow:hidden;
    border:none;padding:0;cursor:pointer;background:transparent;
    transform-origin:bottom center;
    transition:transform .16s ease-out;
    will-change:transform;
  }
  .dock-icono svg{width:100%;height:100%;display:block}
  .dock-icono::after{
    content:attr(data-nombre);
    position:absolute;left:50%;bottom:calc(100% + 14px);transform:translateX(-50%) scale(.9);
    background:rgba(30,30,30,.92);color:#fff;font-size:10.5px;letter-spacing:.04em;
    padding:5px 10px;border-radius:7px;white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;
  }
  .dock-icono:hover::after{opacity:1;transform:translateX(-50%) scale(1)}
  .dock-sep{width:1px;align-self:stretch;margin:4px 2px;background:rgba(0,0,0,.16)}

  /* ---------- Ayuda ---------- */
  #ayuda{
    position:fixed;right:22px;bottom:22px;z-index:200;
    width:34px;height:34px;border-radius:50%;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.14);color:rgba(255,255,255,.9);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
    transition:background .2s,transform .2s;
  }
  #ayuda:hover{background:rgba(255,255,255,.28);transform:scale(1.08)}

  /* ---------- Toast ---------- */
  #toast{
    position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(8px);
    background:rgba(25,25,25,.92);color:#f5f5f5;
    font-size:12.5px;letter-spacing:.02em;
    padding:10px 18px;border-radius:999px;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
    z-index:300;max-width:80vw;text-align:center;
  }
  #toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- Grano de película ---------- */
  #grano{
    position:fixed;inset:0;width:100%;height:100%;
    z-index:250;pointer-events:none;
    mix-blend-mode:overlay;opacity:.45;
  }

  /* ---------- Llegada por el portal: estrellas desacelerando ---------- */
  .warp-llegada{
    position:fixed;inset:0;z-index:4000;
    background:#050313;pointer-events:none;
  }
  .warp-llegada canvas{position:absolute;inset:0;width:100%;height:100%}
  .warp-llegada.irse{opacity:0;transition:opacity .65s ease}

  /* ---------- Cursor personalizado ---------- */
  #cursor{
    position:fixed;left:0;top:0;z-index:400;pointer-events:none;
    width:30px;height:30px;
    display:none;
  }
  html.cursor-oculto #cursor{display:block}
  #cursor svg{
    width:100%;height:100%;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.35));
    transform-origin:7px 5px;
    transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  }
  #cursor.grande svg{transform:scale(1.4)}
  #cursor.presionado svg{transform:scale(.8)}
  #cursor.grande.presionado svg{transform:scale(1.12)}

  /* anillo que sigue al cursor con retardo */
  #cursor-halo{
    position:fixed;left:0;top:0;z-index:399;pointer-events:none;
    width:34px;height:34px;margin:-17px 0 0 -17px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,.45);
    background:rgba(255,255,255,.05);
    display:none;
    transition:width .28s cubic-bezier(.34,1.3,.5,1),height .28s cubic-bezier(.34,1.3,.5,1),
               margin .28s cubic-bezier(.34,1.3,.5,1),border-color .28s,background .28s;
  }
  html.cursor-oculto #cursor-halo{display:block}
  #cursor-halo.anillo{
    width:56px;height:56px;margin:-28px 0 0 -28px;
    border-color:rgba(255,255,255,.9);background:rgba(255,255,255,.10);
  }
  #cursor-halo.presionado{width:22px;height:22px;margin:-11px 0 0 -11px;background:rgba(255,255,255,.22)}

  /* etiqueta contextual junto al cursor (Abrir / Cerrar) */
  #cursor-etiqueta{position:fixed;left:0;top:0;z-index:401;pointer-events:none;display:none}
  html.cursor-oculto #cursor-etiqueta{display:block}
  #cursor-etiqueta span{
    display:inline-block;
    background:rgba(250,250,250,.97);color:#111;
    font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    padding:5px 11px;border-radius:999px;white-space:nowrap;
    box-shadow:0 8px 22px rgba(0,0,0,.3);
    transform:translate(17px,21px) scale(0);
    transform-origin:left top;
    transition:transform .24s cubic-bezier(.34,1.56,.64,1);
  }
  #cursor-etiqueta.visible span{transform:translate(17px,21px) scale(1)}

  /* ---------- Móvil ---------- */
  @media (max-width:720px){
    .icono .mini{width:52px;height:52px}
    .icono .nombre{font-size:10.5px}
    .marca{top:16px;left:18px;font-size:11.5px}
    .marca small{display:none}
    #reloj{top:16px;right:18px;font-size:11px}
    #sticker{width:44px;height:44px;left:24%;top:62%}
    .ventana{
      left:50% !important;top:auto !important;bottom:86px;
      transform:translateX(-50%) scale(.94) translateY(12px);
      width:calc(100vw - 24px);
    }
    .ventana.abierta{transform:translateX(-50%) scale(1) translateY(0)}
    .ventana.cerrando{transform:translateX(-50%) scale(.95) translateY(10px)}
    .ventana-cuerpo{flex-direction:column;max-height:calc(100dvh - 210px)}
    .ventana-hero{flex:none;min-height:150px;height:150px}
    .ventana-info{padding:18px 20px 20px;overflow-y:auto}
    .ventana-info h2{font-size:21px}
    #dock{gap:7px;padding:8px 11px;bottom:12px}
    .dock-icono{width:42px;height:42px}
    #ayuda{right:14px;bottom:74px}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>

  <div id="escena">
    <div id="fondo">
      <!-- Figura abstracta generada (monocromo). -->
      <svg class="figura" viewBox="0 0 1000 1000" aria-hidden="true">
        <defs>
          <filter id="f14" filterUnits="userSpaceOnUse" x="-200" y="-200" width="1400" height="1400"><feGaussianBlur stdDeviation="14"/></filter>
          <filter id="f26" filterUnits="userSpaceOnUse" x="-200" y="-200" width="1400" height="1400"><feGaussianBlur stdDeviation="26"/></filter>
          <filter id="f55" filterUnits="userSpaceOnUse" x="-200" y="-200" width="1400" height="1400"><feGaussianBlur stdDeviation="55"/></filter>
        </defs>
        <!-- halo -->
        <ellipse cx="500" cy="520" rx="470" ry="510" fill="#a3a3a3" filter="url(#f55)" opacity=".6"/>
        <!-- brazos (suaves, detrás del cuerpo) -->
        <g filter="url(#f26)">
          <ellipse cx="195" cy="840" rx="160" ry="250" fill="#b2b2b2"/>
          <ellipse cx="805" cy="830" rx="170" ry="255" fill="#cfcfcf"/>
        </g>
        <!-- estructura: cuerpo, costuras, capucha y abertura -->
        <g filter="url(#f14)">
          <path d="M110 1040 C130 750 260 585 500 575 C740 585 870 750 890 1040 Z" fill="#c4c4c4"/>
          <path d="M175 730 C330 685 670 685 825 735" stroke="#999999" stroke-width="24" fill="none" opacity=".8"/>
          <path d="M150 865 C330 810 670 810 850 870" stroke="#949494" stroke-width="26" fill="none" opacity=".75"/>
          <path d="M140 990 C330 935 670 935 860 995" stroke="#8f8f8f" stroke-width="26" fill="none" opacity=".7"/>
          <path d="M500 108 C650 118 730 255 722 395 C716 500 645 562 500 568 C355 562 284 500 278 395 C270 255 350 118 500 108 Z" fill="#c2c2c2"/>
          <path d="M500 130 C635 140 706 262 699 390 C694 485 630 545 500 550 C370 545 306 485 301 390 C294 262 365 140 500 130 Z" fill="#cecece" opacity=".9"/>
          <ellipse cx="500" cy="378" rx="88" ry="114" fill="#7e7e7e"/>
        </g>
        <!-- luces y matices sobre la estructura -->
        <g filter="url(#f26)">
          <ellipse cx="500" cy="392" rx="66" ry="88" fill="#9e9e9e" opacity=".9"/>
          <ellipse cx="472" cy="342" rx="40" ry="28" fill="#ababab" opacity=".8"/>
          <ellipse cx="500" cy="252" rx="90" ry="14" fill="#e2e2e2" opacity=".85"/>
          <ellipse cx="420" cy="185" rx="135" ry="70" fill="#dedede" opacity=".8"/>
          <ellipse cx="700" cy="600" rx="110" ry="150" fill="#d6d6d6" opacity=".55"/>
        </g>
      </svg>

      <!-- FOTO PROPIA (opcional): pega la URL de tu imagen aquí, en src="".
           Ejemplo:  <img id="foto-fondo" src="mi-retrato.jpg" alt="">      -->
      <img id="foto-fondo" src="" alt="">

      <!-- Sticker sonriente (se puede arrastrar) -->
      <button id="sticker" aria-label="Sticker">
        <svg viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="30" r="26" stroke="rgba(255,255,255,.95)" stroke-width="3.2"/>
          <circle cx="21.5" cy="24.5" r="3.1" fill="rgba(255,255,255,.95)"/>
          <circle cx="38.5" cy="24.5" r="3.1" fill="rgba(255,255,255,.95)"/>
          <path d="M18 35c2.8 5.4 7 8.1 12 8.1s9.2-2.7 12-8.1" stroke="rgba(255,255,255,.95)" stroke-width="3.2" stroke-linecap="round"/>

/* ---------- Miniaturas SVG generadas ---------- */

function sombrear(hex, pct){
  const v = hex.replace("#","");
  const num = parseInt(v.length===3 ? v.split("").map(c=>c+c).join("") : v, 16);
  const f = c => Math.max(0, Math.min(255, Math.round(c + (pct/100)*255)));
  return `rgb(${f(num>>16)},${f((num>>8)&255)},${f(num&255)})`;
}

      </div>`;
    // el click se escucha en el contenedor: setPointerCapture puede
    // redirigir el evento fuera del botón interno
    el.addEventListener("click", () => {
      if (el.dataset.arrastrado === "1") { el.dataset.arrastrado = ""; return; }
      if (p.enlacePagina) { location.href = p.enlacePagina; return; }

    });
    hacerArrastrable(el, p);

    setTimeout(() => el.classList.add("aparecer"), 320 + i*130);
    setTimeout(() => el.classList.remove("oculto-inicial","aparecer"), 2200 + i*130);
  });
}
function posicionarIcono(el, p){
  const x = esMovil() && p.xm != null ? p.xm : p.x;
  const y = esMovil() && p.ym != null ? p.ym : p.y;
  el.style.left = x + "%";
  el.style.top  = y + "%";
}

/* ---------- Arrastre de iconos (estilo escritorio) ---------- */
function hacerArrastrable(el, p){
  let px=0, py=0, sx=0, sy=0, movio=false, id=null;
  el.addEventListener("pointerdown", e => {
    if (e.button && e.button !== 0) return;
    id = e.pointerId;
    el.setPointerCapture(id);
    sx = e.clientX; sy = e.clientY;
    const r = el.getBoundingClientRect();
    px = r.left + r.width/2; py = r.top + r.height/2;
    movio = false;
  });
  el.addEventListener("pointermove", e => {
    if (id === null || e.pointerId !== id) return;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (!movio && Math.hypot(dx,dy) < 7) return;
    movio = true;
    el.classList.add("arrastrando");
    const X = Math.min(97, Math.max(3,  (px+dx) / innerWidth  * 100));
    const Y = Math.min(88, Math.max(5,  (py+dy) / innerHeight * 100));
    el.style.left = X + "%";
    el.style.top  = Y + "%";
    if (esMovil()) { p.xm = X; p.ym = Y; } else { p.x = X; p.y = Y; }
  });
  const soltar = e => {
    if (id === null || (e.pointerId !== undefined && e.pointerId !== id)) return;
    id = null;
    el.classList.remove("arrastrando");
    if (movio) el.dataset.arrastrado = "1";
  };
  el.addEventListener("pointerup", soltar);
  el.addEventListener("pointercancel", soltar);
}

/* ---------- Ventanas ---------- */
const capaVentanas = $("#capa-ventanas");
let ventanaActual = null;

function cerrarVentana(inmediato){
  if (!ventanaActual) return;
  const v = ventanaActual;
  ventanaActual = null;
  $$(".icono.activo").forEach(i => i.classList.remove("activo"));
  if (inmediato) { v.remove(); return; }
  v.classList.add("cerrando");
  v.classList.remove("abierta");
  setTimeout(() => v.remove(), 300);
}

function crearVentana(titulo, cuerpoHTML){
  cerrarVentana(true);
  const v = document.createElement("section");
  v.className = "ventana";
  v.setAttribute("role","dialog");
  v.setAttribute("aria-label", titulo);
  v.innerHTML = `
    <header class="ventana-barra">
      <span class="luces">
        <button class="luz luz-roja" aria-label="Cerrar"></button>
        <span class="luz luz-ambar"></span>
        <span class="luz luz-verde"></span>
      </span>
      <span class="ventana-titulo">${titulo}</span>
    </header>
    ${cuerpoHTML}`;
  capaVentanas.appendChild(v);
  // posición inicial (el CSS móvil la reemplaza por hoja inferior)
  const w = v.offsetWidth, h = v.offsetHeight;
  const jx = (Math.random()-.5)*40, jy = (Math.random()-.5)*30;
  v.style.left = Math.max(12, (innerWidth - w)/2 + jx) + "px";
  v.style.top  = Math.max(54, (innerHeight - h)/2 - 24 + jy) + "px";
  requestAnimationFrame(() => requestAnimationFrame(() => v.classList.add("abierta")));
  v.querySelector(".luz-roja").addEventListener("click", () => cerrarVentana());
  arrastrarVentana(v);
  ventanaActual = v;
  return v;
}

function arrastrarVentana(v){
  const barra = v.querySelector(".ventana-barra");
  let id=null, ox=0, oy=0;
  barra.addEventListener("pointerdown", e => {
    if (esMovil() || e.target.closest(".luz-roja")) return;
    id = e.pointerId;
    barra.setPointerCapture(id);
    const r = v.getBoundingClientRect();
    ox = e.clientX - r.left; oy = e.clientY - r.top;
  });
  barra.addEventListener("pointermove", e => {
    if (id === null || e.pointerId !== id) return;
    v.style.left = Math.min(innerWidth-80,  Math.max(-v.offsetWidth+120, e.clientX-ox)) + "px";
    v.style.top  = Math.min(innerHeight-60, Math.max(8, e.clientY-oy)) + "px";
    // leve inclinación según la velocidad horizontal
    v.style.rotate = Math.max(-1.8, Math.min(1.8, e.movementX * .07)) + "deg";
  });
  const fin = () => { id = null; v.style.rotate = "0deg"; };
  barra.addEventListener("pointerup", fin);
  barra.addEventListener("pointercancel", fin);
}

  const v = crearVentana(p.etiqueta, `
    <div class="ventana-cuerpo">

}

function renderDock(){
  const dock = $("#dock");
  APPS_DOCK.forEach(app => {
    if (app.sep){
      const s = document.createElement("span");
      s.className = "dock-sep";
      dock.appendChild(s);
      return;
    }
    const b = document.createElement("button");
    b.className = "dock-icono";
    b.dataset.nombre = app.nombre;
    b.setAttribute("aria-label", app.nombre);
    b.innerHTML = app.svg;
    b.addEventListener("click", () => {
      if (app.accion) return app.accion();
      const url = PERFIL.redes[app.red];
      if (url) window.open(url, "_blank", "noopener");
      else mostrarToast(`Añade tu enlace de ${app.nombre} en PERFIL.redes.${app.red} (ZONA EDITABLE).`);
    });
    dock.appendChild(b);
  });
  if (esTactil || menosMovim) return;
  // efecto lupa estilo macOS
  const iconos = $$(".dock-icono");
  dock.addEventListener("mousemove", e => {
    iconos.forEach(ic => {
      const r = ic.getBoundingClientRect();
      const d = Math.abs(e.clientX - (r.left + r.width/2));
      const f = Math.max(0, 1 - d/110);
      const esc = 1 + f*.34;
      ic.style.transform = `translateY(${-f*11}px) scale(${esc})`;
    });
  });
  dock.addEventListener("mouseleave", () =>
    iconos.forEach(ic => ic.style.transform = ""));
}

/* ---------- Toast ---------- */
let toastTimer = null;
function mostrarToast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("visible");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("visible"), 3200);
}

/* ---------- Motor de mouse: cursor, anillo, etiqueta, imán,
              inclinación 3D, foco de luz y parallax con inercia ---------- */
function iniciarMotorRaton(){
  if (esTactil || menosMovim || !matchMedia("(hover:hover) and (pointer:fine)").matches) return;
  document.documentElement.classList.add("cursor-oculto");
  const cur   = $("#cursor");
  const halo  = $("#cursor-halo");
  const etiq  = $("#cursor-etiqueta");
  const texto = etiq.querySelector("span");
  const foco  = $("#foco");
  const fondo = $("#fondo");
  const lerp  = (a,b,t) => a + (b-a)*t;

  let mx = innerWidth/2, my = innerHeight/2;         // objetivo (mouse real)
  let cx = mx, cy = my;                              // cursor  (rápido)
  let hx = mx, hy = my;                              // anillo  (retardo medio)
  let fx = mx, fy = my;                              // foco    (retardo largo)
  let px = 0,  py = 0;                               // parallax con inercia
  let vel = 0, activo = false;
  let focoW = foco.offsetWidth, focoH = foco.offsetHeight;
  addEventListener("resize", () => { focoW = foco.offsetWidth; focoH = foco.offsetHeight; });

  addEventListener("mousemove", e => {
    mx = e.clientX; my = e.clientY;
    if (!activo){ activo = true; document.body.classList.add("raton-activo"); }
  });

  // estados contextuales según lo que hay bajo el puntero
  document.addEventListener("mouseover", e => {
    const t      = e.target;
    const icono  = t.closest?.(".icono");
    const cerrar = t.closest?.(".luz-roja");
    const inter  = t.closest?.("button, a, .dock-icono, .ventana-barra");
    cur.classList.toggle("grande", !!inter && !icono);
    halo.classList.toggle("anillo", !!(inter || icono));
    if (cerrar)      { texto.textContent = "Cerrar"; etiq.classList.add("visible"); }
    else if (icono)  { texto.textContent = "Abrir";  etiq.classList.add("visible"); }
    else               etiq.classList.remove("visible");
  });
  addEventListener("mousedown", () => { cur.classList.add("presionado");  halo.classList.add("presionado"); });
  addEventListener("mouseup",   () => { cur.classList.remove("presionado"); halo.classList.remove("presionado"); });
  addEventListener("blur",      () => { cur.classList.remove("presionado"); halo.classList.remove("presionado"); });

  // imán: los iconos y el botón de ayuda se acercan sutilmente al puntero
  const imanes = [...$$(".icono button"), $("#ayuda")]
    .filter(Boolean).map(el => ({ el, ox:0, oy:0 }));

  // inclinación 3D de las miniaturas según la posición del puntero
  capaIconos.addEventListener("pointermove", e => {
    const b = e.target.closest?.(".icono button");
    if (!b) return;
    const r = b.getBoundingClientRect();
    b.style.setProperty("--ry",  (((e.clientX - r.left) / r.width  - .5) * 16).toFixed(2) + "deg");
    b.style.setProperty("--rx", -(((e.clientY - r.top)  / r.height - .5) * 14).toFixed(2) + "deg");
  });
  capaIconos.addEventListener("pointerout", e => {
    const b = e.target.closest?.(".icono button");
    if (b){ b.style.setProperty("--ry","0deg"); b.style.setProperty("--rx","0deg"); }
  });

  (function paso(){
    const pcx = cx, pcy = cy;
    cx = lerp(cx, mx, .45);  cy = lerp(cy, my, .45);
    hx = lerp(hx, mx, .16);  hy = lerp(hy, my, .16);
    fx = lerp(fx, mx, .07);  fy = lerp(fy, my, .07);
    vel = lerp(vel, Math.hypot(cx-pcx, cy-pcy), .3);

    cur.style.transform  = `translate3d(${cx-4}px, ${cy-3}px, 0)`;
    const esc = 1 + Math.min(vel/48, .35);          // el anillo se estira con la velocidad
    halo.style.transform = `translate3d(${hx}px, ${hy}px, 0) scale(${esc})`;
    etiq.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
    foco.style.transform = `translate3d(${fx-focoW/2}px, ${fy-focoH/2}px, 0)`;

    // parallax con inercia
    const nx = (mx/innerWidth - .5) * 2, ny = (my/innerHeight - .5) * 2;
    px = lerp(px, nx, .06);  py = lerp(py, ny, .06);
    fondo.style.transform      = `translate3d(${(px*-16).toFixed(2)}px, ${(py*-10).toFixed(2)}px, 0)`;
    capaIconos.style.transform = `translate3d(${(px*10).toFixed(2)}px, ${(py*7).toFixed(2)}px, 0)`;

    // imán
    for (const m of imanes){
      const r = m.el.getBoundingClientRect();
      const ccx = r.left + r.width/2  - m.ox;
      const ccy = r.top  + r.height/2 - m.oy;
      const dx = mx - ccx, dy = my - ccy;
      const d  = Math.hypot(dx, dy);
      let tx = 0, ty = 0;
      if (d < 120){ const f = (1 - d/120) * .3; tx = dx*f; ty = dy*f; }
      m.ox = lerp(m.ox, tx, .16);
      m.oy = lerp(m.oy, ty, .16);
      m.el.style.translate = `${m.ox.toFixed(2)}px ${m.oy.toFixed(2)}px`;
    }
    requestAnimationFrame(paso);
  })();
}

/* ---------- Sticker arrastrable ---------- */
function iniciarSticker(){
  const st = $("#sticker");
  let id=null, ox=0, oy=0;
  st.addEventListener("pointerdown", e => {
    id = e.pointerId;
    st.setPointerCapture(id);
    const r = st.getBoundingClientRect();
    ox = e.clientX - r.left - r.width/2;
    oy = e.clientY - r.top  - r.height/2;
  });
  st.addEventListener("pointermove", e => {
    if (id === null || e.pointerId !== id) return;
    st.style.left = ((e.clientX - ox) / innerWidth  * 100) + "%";
    st.style.top  = ((e.clientY - oy) / innerHeight * 100) + "%";
  });
  const fin = () => { id = null; };
  st.addEventListener("pointerup", fin);
  st.addEventListener("pointercancel", fin);
}

/* ---------- Reloj ---------- */
function iniciarReloj(){
  const r = $("#reloj");
  const pinta = () => {
    const d = new Date();
    const fecha = d.toLocaleDateString("es-PE",{weekday:"short", day:"numeric", month:"short"});
    const hora  = d.toLocaleTimeString("es-PE",{hour:"2-digit", minute:"2-digit", hour12:false});
    r.textContent = `${fecha} · ${hora}`.replace(/\./g,"");
  };
  pinta();
  setInterval(pinta, 15000);
}

/* ---------- Llegada por el portal (desde el orbe de KIPU) ---------- */
function iniciarLlegada(){
  let viaja = false;
  try{
    viaja = sessionStorage.getItem("kipu_warp") === "1";
    sessionStorage.removeItem("kipu_warp");
  }catch(e){ return; }
  if (!viaja || menosMovim) return;
  const velo = document.createElement("div");
  velo.className = "warp-llegada";
  velo.setAttribute("aria-hidden","true");
  const cv = document.createElement("canvas");
  velo.appendChild(cv);
  document.body.appendChild(velo);
  const ctx = cv.getContext("2d");
  const DPR = Math.min(2, devicePixelRatio || 1);
  const W = cv.width = Math.round(innerWidth * DPR);
  const H = cv.height = Math.round(innerHeight * DPR);
  const cx = W/2, cy = H/2;
  const COLS = ["235,230,255","235,230,255","216,167,255","255,207,122","178,107,255"];
  const est = [];
  for (let i = 0; i < 220; i++){
    est.push({ a: Math.random()*6.2832, d: 20 + Math.random()*(W*.5), v: .6 + Math.random(), col: COLS[i%5] });
  }
  const t0 = performance.now(), DUR = 750; /* [EDITABLE] duración de la llegada en ms */
  requestAnimationFrame(function paso(t){
    const p = Math.min(1, (t - t0) / DUR);
    ctx.fillStyle = "rgba(5,3,19,.5)";
    ctx.fillRect(0, 0, W, H);
    const vel = 2 + Math.pow(1 - p, 2.2) * 70; /* desacelera: saliendo del warp */
    ctx.lineWidth = DPR;
    for (const e of est){
      const len = vel * e.v * DPR;
      const x = cx + Math.cos(e.a)*e.d, y = cy + Math.sin(e.a)*e.d;
      ctx.strokeStyle = "rgba(" + e.col + "," + (1 - p*.55).toFixed(2) + ")";
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(cx + Math.cos(e.a)*(e.d+len), cy + Math.sin(e.a)*(e.d+len));
      ctx.stroke();
      e.d += vel * e.v;
      if (e.d > Math.max(W,H)*.75) e.d = 10 + Math.random()*60;
    }
    if (p >= 1){
      velo.classList.add("irse");
      setTimeout(() => velo.remove(), 700);
      return;
    }
    requestAnimationFrame(paso);
  });
}
